version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

# Release Drafter owns the release and its notes; only attach artifacts.
release:
  mode: keep-existing

changelog:
  disable: true
