name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
  - title: '🔧 Refactors'
    labels:
      - 'refactor'
version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feat'
  default: 'patch'
autolabeler:
  - label: 'feat'
    branch:
      - '/feat.+/'
  - label: 'fix'
    branch:
      - '/fix.+/'
  - label: 'chore'
    branch:
      - '/chore.+/'
  - label: 'refactor'
    branch:
      - '/refactor.+/'
template: |
  ## What's Changed

  $CHANGES
